name: Pipeline CI - Foco Diário

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Análise Estática (Linting com Flake8)
      run: |
        # Para a execução se houver erros graves de sintaxe
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Verifica estilo do código (limite de 120 caracteres por linha para não quebrar à toa)
        flake8 src/ tests/ --count --max-line-length=120 --statistics

    - name: Rodar Testes Automatizados (Pytest)
      run: |
        pytest tests/
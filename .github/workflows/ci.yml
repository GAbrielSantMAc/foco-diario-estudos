name: Pipeline CI - Foco Diário

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

   - name: Análise Estática (Linting com Flake8)
      run: |
        # Ignora erros de espaços (E203, W503) e foca apenas em erros reais de sintaxe
        flake8 src/ tests/ --count --ignore=E203,W503,E501 --statistics

    - name: Rodar Testes Automatizados (Pytest)
      run: |
        pytest tests/
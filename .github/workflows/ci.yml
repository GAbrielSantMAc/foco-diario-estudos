name: Pipeline CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - setup-python: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install
      run: pip install pytest flake8
    - name: Lint
      run: flake8 . --exit-zero
    - name: Test
      run: pytest
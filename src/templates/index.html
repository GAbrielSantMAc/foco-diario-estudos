<!DOCTYPE html>
<html>
<head>
    <title>Foco Diário</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 40px;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: #1e293b;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 8px;
        }
    </style>
</head>

<body>

    <h1>🔥 Foco Diário</h1>

    <input id="tarefa" placeholder="Digite sua tarefa">
    <button onclick="adicionar()">Adicionar</button>

    <ul id="lista"></ul>

<script>
async function carregar() {
    let res = await fetch("/tarefas");
    let data = await res.json();

    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    data.forEach((t, i) => {
        lista.innerHTML += `<li>${i} - ${t}</li>`;
    });
}

async function adicionar() {
    let tarefa = document.getElementById("tarefa").value;

    await fetch("/tarefas", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({tarefa})
    });

    document.getElementById("tarefa").value = "";
    carregar();
}

carregar();
</script>

</body>
</html>

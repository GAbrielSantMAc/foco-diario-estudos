<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foco Diário</title>

    <style>
        :root {
            --bg-color: #0b132b;
            --card-color: #1c2541;
            --input-bg: #ffffff;
            --btn-green: #10b981;
            --btn-green-hover: #059669;
            --btn-delete: #ef4444;
            --text-main: #ffffff;
            --text-muted: #5c677d;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
        }

        button.btn-add {
            background-color: var(--btn-green);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        #feedback {
            margin-bottom: 15px;
            font-size: 0.9rem;
            min-height: 20px;
        }

        .lista-tarefas {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tarefa-item {
            background-color: var(--card-color);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
        }

        .btn-delete {
            background: none;
            border: none;
            color: red;
            cursor: pointer;
        }

        .estado-vazio {
            color: var(--text-muted);
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🔥 Foco Diário</h1>

    <div class="input-group">
        <input type="text" id="inputTarefa" placeholder="Digite sua tarefa...">
        <button class="btn-add" onclick="adicionarTarefa()">Adicionar</button>
    </div>

    <div id="feedback"></div>

    <div class="lista-tarefas" id="listaTarefas"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", carregarTarefas);

document.getElementById("inputTarefa").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        adicionarTarefa();
    }
});

// ✅ FUNÇÃO CORRIGIDA
function mostrarFeedback(mensagem, tipo) {
    const fb = document.getElementById("feedback");
    fb.innerText = mensagem;

    fb.style.color = tipo === "sucesso" ? "#10b981" : "#ef4444";

    setTimeout(() => {
        fb.innerText = "";
    }, 3000);
}

// GET
async function carregarTarefas() {
    const response = await fetch("/tarefas");
    const tarefas = await response.json();

    const lista = document.getElementById("listaTarefas");
    lista.innerHTML = "";

    if (tarefas.length === 0) {
        lista.innerHTML = `<div class="estado-vazio">Nenhuma tarefa cadastrada.</div>`;
        return;
    }

    tarefas.forEach((tarefa, index) => {
        lista.innerHTML += `
            <div class="tarefa-item">
                <span>${index} - ${tarefa}</span>
                <button class="btn-delete" onclick="deletarTarefa(${index})">❌</button>
            </div>
        `;
    });
}

// POST
async function adicionarTarefa() {
    const input = document.getElementById("inputTarefa");
    const tarefaTexto = input.value.trim();

    if (!tarefaTexto) {
        mostrarFeedback("Digite algo!", "erro");
        return;
    }

    const response = await fetch("/tarefas", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ tarefa: tarefaTexto })
    });

    const data = await response.json();

    if (response.ok) {
        mostrarFeedback("Tarefa adicionada!", "sucesso");
        input.value = "";
        carregarTarefas();
    } else {
        mostrarFeedback(data.erro, "erro");
    }
}

// DELETE
async function deletarTarefa(index) {
    const response = await fetch(`/tarefas/${index}`, {
        method: "DELETE"
    });

    if (response.ok) {
        mostrarFeedback("Tarefa removida!", "sucesso");
        carregarTarefas();
    } else {
        mostrarFeedback("Erro ao remover!", "erro");
    }
}
</script>

</body>
</html>
